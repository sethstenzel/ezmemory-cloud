{% extends "base.html" %}
{% block body %}
<header class="topnav">
  <a class="brand" href="{% url 'home' %}">🧠 ezmemory.cloud</a>
  <nav>
    <a href="{% url 'blog_index' %}">Blog</a>
    <a href="{% url 'tutorials_index' %}">Tutorials</a>
    {% if user.is_authenticated %}
      <a href="{% url 'home' %}">Open App</a>
    {% else %}
      <a href="{% url 'login' %}">Sign in</a>
      <a class="btn-primary" href="{% url 'signup' %}">Sign up</a>
    {% endif %}
  </nav>
</header>
<main class="public-main">
  {% block content %}{% endblock %}
</main>
{% endblock %}
